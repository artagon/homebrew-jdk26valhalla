name: Validate

# Security: First-time contributors require manual approval to run workflows
# Configure in: Settings > Actions > General > Fork pull request workflows
# Set to: "Require approval for first-time contributors"

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-syntax:
    timeout-minutes: 15
    runs-on: macos-14
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@b2a302b9a642580cae998e6ba2076ffd28e61317 # v5

      - name: Validate formula syntax
        run: |
          for f in Formula/*.rb; do
            echo "==> Checking $f"
            brew style "$f"
            ruby -c "$f"
          done

      - name: Validate cask syntax
        run: |
          for f in Casks/*.rb; do
            echo "==> Checking $f"
            brew style "$f"
            ruby -c "$f"
          done

      - name: Audit formulas
        run: |
          for f in Formula/*.rb; do
            name="$(basename "$f" .rb)"
            echo "==> Auditing formula artagon/jdk26valhalla/$name"
            brew audit --formula "artagon/jdk26valhalla/$name"
          done

      - name: Audit casks
        run: |
          for f in Casks/*.rb; do
            name="$(basename "$f" .rb)"
            echo "==> Auditing cask artagon/jdk26valhalla/$name"
            brew audit --cask "artagon/jdk26valhalla/$name"
          done

  test-cask-macos:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@b2a302b9a642580cae998e6ba2076ffd28e61317 # v5

      - name: Test cask installation
        env:
          HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: 1
          HOMEBREW_NO_AUTO_UPDATE: 1
        run: |
          sudo chmod -R o+r /Applications/ 2>/dev/null || true
          brew install --cask artagon/jdk26valhalla/jdkvalhalla

      - name: Verify cask installation
        run: |
          if [ -d "/Library/Java/JavaVirtualMachines/jdk-valhalla.jdk" ]; then
            echo "JDK cask installed successfully"
            /Library/Java/JavaVirtualMachines/jdk-valhalla.jdk/Contents/Home/bin/java -version
          else
            echo "JDK cask installation failed"
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          brew uninstall --cask artagon/jdk26valhalla/jdkvalhalla || true

  test-formula-macos:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@b2a302b9a642580cae998e6ba2076ffd28e61317 # v5

      - name: Diagnose disk and install formula
        env:
          HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: 1
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_INSTALL_CLEANUP: 1
        run: |
          echo "=== Disk usage ==="
          df -h
          echo "=== Homebrew prefix ==="
          brew --prefix
          brew --cellar
          echo "=== Cellar disk ==="
          df -h "$(brew --cellar)"
          sudo chmod -R o+r /Applications/ 2>/dev/null || true
          # Fetch first, then install to separate download from install
          brew fetch --formula artagon/jdk26valhalla/jdkvalhalla@27
          echo "=== After fetch ==="
          df -h "$(brew --cellar)"
          brew install artagon/jdk26valhalla/jdkvalhalla@27

      - name: Verify formula installation
        run: |
          JDK_PREFIX="$(brew --prefix jdkvalhalla@27)"
          if [ -d "$JDK_PREFIX" ]; then
            echo "JDK formula installed successfully at $JDK_PREFIX"
            "$JDK_PREFIX/bin/java" -version
          else
            echo "JDK formula installation failed"
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          brew uninstall --formula jdkvalhalla@27 || true

  test-install-linux:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x64
          - os: ubuntu-24.04
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@b2a302b9a642580cae998e6ba2076ffd28e61317 # v5

      - name: Cache Homebrew downloads
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/Homebrew/downloads
          key: ${{ runner.os }}-${{ matrix.arch }}-homebrew-jdkvalhalla-formula-${{ hashFiles('Formula/jdkvalhalla@27.rb') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-homebrew-jdkvalhalla-formula-

      - name: Display system info
        run: |
          echo "OS: $(uname -s)"
          echo "Arch: $(uname -m)"
          echo "Distribution: $(cat /etc/os-release | grep PRETTY_NAME)"

      - name: Test formula installation
        env:
          HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: 1
        run: |
          brew install artagon/jdk26valhalla/jdkvalhalla@27

      - name: Verify installation
        run: |
          JDK_PREFIX="$(brew --prefix jdkvalhalla@27)"
          if [ -d "$JDK_PREFIX" ]; then
            echo "JDK installed successfully at $JDK_PREFIX"
            "$JDK_PREFIX/bin/java" -version
          else
            echo "JDK installation failed"
            exit 1
          fi

      - name: Test JAVA_HOME setup
        run: |
          export JAVA_HOME="$(brew --prefix jdkvalhalla@27)"
          echo "JAVA_HOME=$JAVA_HOME"
          echo "Testing java compiler and runtime..."
          "$JAVA_HOME/bin/java" -version
          "$JAVA_HOME/bin/javac" -version

      - name: Test basic Java functionality
        run: |
          export JAVA_HOME="$(brew --prefix jdkvalhalla@27)"
          export PATH="$JAVA_HOME/bin:$PATH"

          # Create and compile a test program
          cat > HelloWorld.java << 'JAVAEOF'
          public class HelloWorld {
              public static void main(String[] args) {
                  System.out.println("JDK Valhalla is working!");
                  System.out.println("Java version: " + System.getProperty("java.version"));
              }
          }
          JAVAEOF

          javac HelloWorld.java
          java HelloWorld

      - name: Cleanup
        if: always()
        run: |
          brew uninstall --formula jdkvalhalla@27 || true

  validation-status:
    name: Validation Status
    runs-on: ubuntu-latest
    needs:
      - validate-syntax
      - test-cask-macos
      - test-formula-macos
      - test-install-linux
    steps:
      - name: Confirm completion
        run: echo "All validation jobs completed successfully."

      - name: Publish Validate status for branch protection
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          gh api \
            --method POST \
            "repos/${REPO}/statuses/${SHA}" \
            -f state=success \
            -f context=Validate \
            -f description="All validation jobs completed successfully."
