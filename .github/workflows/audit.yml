name: Audit

on:
  schedule:
    - cron: '0 12 * * 1'  # Weekly on Mondays at noon UTC
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@319e41e9a0514142e0bfaac2e74c43e7e2182790 # v5

      - name: Validate formula syntax
        run: |
          for f in Formula/*.rb; do
            echo "==> Checking $f"
            brew style "$f"
            ruby -c "$f"
          done

      - name: Validate cask syntax
        run: |
          for f in Casks/*.rb; do
            echo "==> Checking $f"
            brew style "$f"
            ruby -c "$f"
          done

      - name: Audit formulas
        run: |
          for f in Formula/*.rb; do
            name="$(basename "$f" .rb)"
            echo "==> Auditing formula artagon/jdkvalhalla/$name"
            brew audit --formula "artagon/jdkvalhalla/$name"
          done

      - name: Audit casks
        run: |
          for f in Casks/*.rb; do
            name="$(basename "$f" .rb)"
            echo "==> Auditing cask artagon/jdkvalhalla/$name"
            brew audit --cask "artagon/jdkvalhalla/$name"
          done
