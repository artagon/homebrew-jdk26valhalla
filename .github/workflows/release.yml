name: Release

on:
  push:
    branches: [main]
    paths:
      - 'Casks/*.rb'
      - 'Formula/*.rb'

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: release-approval
      url: https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0  # Fetch all history for changelog

      - name: Set up Homebrew
        if: runner.os == 'Linux'
        uses: Homebrew/actions/setup-homebrew@b2a302b9a642580cae998e6ba2076ffd28e61317 # v5

      - name: Audit cask
        run: |
          brew untap artagon/jdkvalhalla || true
          brew tap --custom-remote artagon/jdkvalhalla "$GITHUB_WORKSPACE"
          brew audit --cask artagon/jdkvalhalla/jdkvalhalla

      - name: Extract version from cask
        id: version
        run: |
          set -euo pipefail
          VERSION=$(grep -oP 'version "\K[^"]+' Casks/jdkvalhalla.rb)
          if [[ -z "$VERSION" ]]; then
            echo "Failed to extract version from Casks/jdkvalhalla.rb"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Extract build number for changelog
          BUILD=$(echo "$VERSION" | grep -oP '\+\K\d+')
          if [[ -z "$BUILD" || ! "$BUILD" =~ ^[0-9]+$ ]]; then
            echo "Failed to extract build number from version $VERSION"
            exit 1
          fi
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get previous version
        if: steps.check_tag.outputs.exists == 'false'
        id: prev_version
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=$PREV_TAG" >> "$GITHUB_OUTPUT"

          if [ -n "$PREV_TAG" ]; then
            PREV_VERSION=$(echo "$PREV_TAG" | sed 's/^v//')
            echo "version=$PREV_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog
        if: steps.check_tag.outputs.exists == 'false'
        id: changelog
        run: |
          PREV_TAG="${{ steps.prev_version.outputs.tag }}"

          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          fi

          # Save to multiline output using delimiter
          {
            echo 'changelog<<EOF'
            echo "$CHANGELOG"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Update README with current version
        if: steps.check_tag.outputs.exists == 'false'
        id: update_readme
        env:
          BUILD: ${{ steps.version.outputs.build }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import datetime
          import os
          import pathlib
          import re
          import sys
          import urllib.request

          build = os.environ["BUILD"]
          readme_path = pathlib.Path("README.md")

          try:
              with urllib.request.urlopen("https://jdk.java.net/valhalla/", timeout=30) as response:
                  page = response.read().decode("utf-8", "replace")
          except Exception as exc:
              print(f"Failed to fetch release page: {exc}", file=sys.stderr)
              sys.exit(1)

          match = re.search(rf"Build {re.escape(build)} \((\d{{4}}/\d{{1,2}}/\d{{1,2}})\)", page)
          if match:
              year, month, day = match.group(1).split("/")
              release_date = f"{int(year):04d}-{int(month):02d}-{int(day):02d}"
          else:
              release_date = datetime.date.today().isoformat()

          text = readme_path.read_text()
          pattern = r"\*\*JDK Valhalla Build [^\*]+\*\* \(Released: [0-9-]*\)"
          replacement = f"**JDK Valhalla Build {build}** (Released: {release_date})"
          new_text, count = re.subn(pattern, replacement, text, count=1)
          if count != 1:
              print("Failed to update README version banner", file=sys.stderr)
              sys.exit(1)

          changed = new_text != text
          if changed:
              readme_path.write_text(new_text)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"changed={'true' if changed else 'false'}\n")
              fh.write(f"release_date={release_date}\n")
          PY

      - name: Create README update pull request
        if: steps.check_tag.outputs.exists == 'false' && steps.update_readme.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7.0.8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: update README to Valhalla Build ${{ steps.version.outputs.build }}"
          title: "docs: update README to Valhalla Build ${{ steps.version.outputs.build }}"
          body: |
            This PR updates README.md to reflect Valhalla Build ${{ steps.version.outputs.build }} (released ${{ steps.update_readme.outputs.release_date }}).
          branch: release/readme-${{ steps.version.outputs.build }}
          delete-branch: true

      - name: Fetch release notes from OpenJDK
        if: steps.check_tag.outputs.exists == 'false'
        id: jdk_notes
        run: |
          NOTES_URL="https://jdk.java.net/valhalla/"
          echo "notes_url=$NOTES_URL" >> "$GITHUB_OUTPUT"

      - name: Verify GPG signatures (if available)
        if: steps.check_tag.outputs.exists == 'false'
        id: gpg_verify
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.version }}"
          echo "Checking for GPG signatures for version $VERSION..."

          # OpenJDK EA builds typically don't provide GPG signatures
          # This is a placeholder for when they become available
          # For now, we rely on SHA256 checksums embedded in the formula/cask

          echo "GPG signatures not available for OpenJDK EA builds"
          echo "Using SHA256 checksum verification via Homebrew"
          echo "verified=checksum_only" >> "$GITHUB_OUTPUT"

      - name: Generate SBOM
        if: steps.check_tag.outputs.exists == 'false'
        id: sbom
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.version }}"
          BUILD="${{ steps.version.outputs.build }}"
          SBOM_FILE="sbom-${VERSION}.spdx.json"

          # Generate SPDX 2.3 SBOM
          cat > "$SBOM_FILE" <<EOF
          {
            "spdxVersion": "SPDX-2.3",
            "dataLicense": "CC0-1.0",
            "SPDXID": "SPDXRef-DOCUMENT",
            "name": "Valhalla Build ${BUILD}",
            "documentNamespace": "https://github.com/${{ github.repository }}/releases/tag/v${VERSION}",
            "creationInfo": {
              "created": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
              "creators": [
                "Tool: Artagon/homebrew-jdkvalhalla",
                "Organization: Artagon"
              ]
            },
            "packages": [
              {
                "SPDXID": "SPDXRef-Package",
                "name": "OpenJDK-Valhalla",
                "versionInfo": "${VERSION}",
                "supplier": "Organization: OpenJDK",
                "downloadLocation": "https://jdk.java.net/valhalla/",
                "filesAnalyzed": false,
                "licenseConcluded": "GPL-2.0-only WITH Classpath-exception-2.0",
                "licenseDeclared": "GPL-2.0-only WITH Classpath-exception-2.0",
                "copyrightText": "Copyright (c) Oracle Corporation and/or its affiliates",
                "externalRefs": [
                  {
                    "referenceCategory": "PACKAGE-MANAGER",
                    "referenceType": "purl",
                    "referenceLocator": "pkg:generic/openjdk@${VERSION}"
                  }
                ]
              }
            ],
            "relationships": [
              {
                "spdxElementId": "SPDXRef-DOCUMENT",
                "relationshipType": "DESCRIBES",
                "relatedSpdxElement": "SPDXRef-Package"
              }
            ]
          }
          EOF

          echo "sbom_file=$SBOM_FILE" >> "$GITHUB_OUTPUT"
          echo "Generated SBOM: $SBOM_FILE"

      - name: Create Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Valhalla Build ${{ steps.version.outputs.version }}
          files: ${{ steps.sbom.outputs.sbom_file }}
          body: |
            # Valhalla Build ${{ steps.version.outputs.version }}

            Project Valhalla early-access build from [jdk.java.net/valhalla](${{ steps.jdk_notes.outputs.notes_url }})

            ## Installation

            ### macOS & Linux

            ```bash
            brew tap Artagon/jdkvalhalla
            brew install --cask jdkvalhalla   # macOS only (latest)
            # or
            brew install jdkvalhalla@27       # macOS & Linux
            ```

            ## Supported Platforms

            - macOS ARM64 (Apple Silicon)
            - macOS x64 (Intel)
            - Linux ARM64
            - Linux x64

            ## What's Changed

            ${{ steps.prev_version.outputs.version != 'none' && format('### Changes from {0}', steps.prev_version.outputs.version) || '### Initial Release' }}

            ${{ steps.changelog.outputs.changelog }}

            ## Checksums

            All SHA256 checksums are verified automatically. See the formula/cask files for details.

            ## Links

            - [Project Valhalla Downloads](https://jdk.java.net/valhalla/)
            - [OpenJDK Project Valhalla](https://openjdk.org/projects/valhalla/)

            ---

            **Note:** This is an early-access build and should not be used in production environments.
          draft: false
          prerelease: true
